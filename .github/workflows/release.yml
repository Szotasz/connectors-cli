name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X github.com/Szotasz/connectors-cli/cmd.Version=${VERSION}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/connectors-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/connectors-darwin-amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/connectors-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/connectors-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/connectors-windows-amd64.exe .

      - name: Generate checksums
        run: |
          cd dist
          sha256sum connectors-* > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
